name: Market Alert KR

on:
  workflow_dispatch:
  schedule:
    # UTC 기준 22:20 = KST 기준 다음날 07:20 (평일)
    - cron: "20 22 * * 1-5"

concurrency:
  group: market-alert-kr
  cancel-in-progress: false

jobs:
  run-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Seoul
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret."
            exit 1
          fi

      - name: Run market alert
        run: |
          python --version
          python market_regime_score.py
